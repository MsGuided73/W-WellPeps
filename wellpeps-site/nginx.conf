# Serves Astro's static output. Routes are directory-style
# (/weight-loss/ -> /weight-loss/index.html), so try_files resolves those.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Fingerprinted build assets never change — cache them hard.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Other static media — cache moderately.
    location ~* \.(?:jpg|jpeg|png|webp|avif|gif|svg|ico|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # HTML routes: exact file, directory index, or <name>.html; else 404.
    location / {
        try_files $uri $uri/ $uri.html =404;

        # Security headers on document responses.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # Don't serve dotfiles.
    location ~ /\. { deny all; }
}
